select_task:
  description: >
    Analiza la memoria proporcionada y extrae contenido diferente para cada ranura de ejercicio indicada.

    INFORMACIÓN DE LA MEMORIA:
    - Título: {title}
    - Descripción: {description}
    {analysis}

    LISTA DE RANURAS (en orden): {exercise_types}

    TU MISIÓN:
    Devuelve un JSON array con EXACTAMENTE tantos elementos como ranuras hay en la lista.
    El elemento en la posición N corresponde a la ranura N.

    REGLAS DE EXTRACCIÓN:
    - Para 'fill_in_the_blank': Extrae un fragmento extenso (mínimo 2-3 párrafos o 100 palabras). Si aparece más de una vez, toma SECCIONES DISTINTAS del texto para cada ocurrencia (ej: primera mitad, segunda mitad).
    - Para 'multiple_choice': Extrae entre 4 y 6 afirmaciones cortas de hechos concretos. Si aparece más de una vez, cubre HECHOS DISTINTOS.
    - Para 'ordering': Extrae de 4 a 6 eventos clave en orden cronológico. Si aparece más de una vez, selecciona EVENTOS DE ETAPAS DISTINTAS.

    CRÍTICO: Para tipos REPETIDOS en la lista, el contenido de cada ocurrencia DEBE SER DIFERENTE. Nunca repitas el mismo fragmento ni los mismos hechos.

    RESPONDE ÚNICAMENTE con un array JSON válido (sin texto adicional):
    ["contenido para ranura 0", "contenido para ranura 1", "contenido para ranura 2"]

  expected_output: >
    Un array JSON válido con exactamente tantos elementos como ranuras hay en {exercise_types}.
    Cada elemento es el contenido extraído para esa ranura específica.
  agent: "selector_agent"

fill_in_the_blank_task:
  description: >
    Genera UN ejercicio tipo fill_in_the_blank.

    ╔══════════════════════════════════════════════════════════════╗
    ║  TU NIVEL DE DIFICULTAD ES: >>> {dificultad} <<<            ║
    ║  SIGUE SOLO Y EXCLUSIVAMENTE LAS REGLAS DE ESE NIVEL        ║
    ╚══════════════════════════════════════════════════════════════╝

    ########################################
    # SI TU DIFICULTAD ES "fácil":
    ########################################
    - PREGUNTA: UNA sola frase corta (máximo 10 palabras).
    - QUÉ OCULTAR: El nombre del protagonista principal O el lugar más importante.
    - PISTA: Muy directa, casi la definición.
    - EJEMPLO GENÉRICO: "_______ me llevó de paseo" → correct_answer: "María" / hint: "Tu hija".

    ########################################
    # SI TU DIFICULTAD ES "media":
    ########################################
    - PREGUNTA: DOS frases conectadas (entre 15 y 25 palabras en total).
    - QUÉ OCULTAR: Un objeto concreto, un lugar secundario o una acción específica. NUNCA el nombre del protagonista principal (eso es demasiado fácil para este nivel).
    - PISTA: Descriptiva, dando contexto de la escena.
    - EJEMPLO GENÉRICO: "Fuimos al centro comercial. Compramos unos _______ nuevos" → correct_answer: "vaqueros" / hint: "Prenda de ropa que necesitaba".

    ########################################
    # SI TU DIFICULTAD ES "difícil":
    ########################################
    - PREGUNTA: MÁXIMO 2 frases (entre 15 y 25 palabras en total).
    - QUÉ OCULTAR: Un detalle MUY ESPECÍFICO y PERIFÉRICO: una cantidad, un motivo concreto, un objeto mencionado solo una vez, el nombre de un sitio secundario. NUNCA nombres propios del protagonista NI objetos obvios.
    - PISTA: Indirecta, que obligue a reflexionar sobre la historia completa.
    - EJEMPLO GENÉRICO: "Tuvimos que cambiar de tienda porque no encontraban la talla de _______" → correct_answer: "camiseta" / hint: "Prenda que no tenían disponible".
    - CLAVE: La respuesta debe ser IMPOSIBLE de adivinar sin haber memorizado ese detalle concreto de la historia.

    {feedback_ia}

    {content_to_avoid}

    INFORMACION:
    -[ {informacion} ]

    REGLAS QUE APLICAN A TODOS LOS NIVELES:
    - Escribe en PRIMERA o SEGUNDA persona (mi, mis, yo, fui...). NUNCA "el narrador" o "el protagonista".
    - "question" DEBE contener "_______" en lugar de la palabra oculta.
    - "correct_answer" = UNA SOLA palabra que existe en la información original.
    - PROHIBIDO ocultar: adjetivos (bonito, cálido, grande), verbos genéricos (fue, era, tenía), conectores.
    - Si la palabra se puede adivinar por gramática sin conocer la historia → INVÁLIDO.

    JSON REQUERIDO (sin nada más):
    {
      "type": "fill_in_the_blank",
      "question": string,
      "correct_answer": string,
      "hint": string,
      "difficulty": "{dificultad}"
    }
  expected_output: >
    Un único objeto JSON válido con las claves exactas:
    type, question, correct_answer, hint, difficulty.
  agent: "fill_in_the_blank_agent"

multiple_choice_task:
  description: >
    Genera UN ejercicio de opción múltiple.

    ╔══════════════════════════════════════════════════════════════╗
    ║  TU NIVEL DE DIFICULTAD ES: >>> {dificultad} <<<            ║
    ║  SIGUE SOLO Y EXCLUSIVAMENTE LAS REGLAS DE ESE NIVEL        ║
    ╚══════════════════════════════════════════════════════════════╝

    ########################################
    # SI TU DIFICULTAD ES "fácil":
    ########################################
    - PREGUNTA: Sobre el tema principal o el protagonista (ej: "¿Cómo se llama...?", "¿A dónde fuimos?").
    - DISTRACTORES: Muy diferentes y absurdos comparados con la respuesta correcta.
    - EJEMPLO GENÉRICO: "¿A dónde fuimos de paseo?" → options: ["Al parque", "A la luna", "Al desierto"].

    ########################################
    # SI TU DIFICULTAD ES "media":
    ########################################
    - PREGUNTA: Sobre un dato concreto o un hecho secundario (ej: "¿Qué compramos?", "¿Qué día fue?").
    - DISTRACTORES: De la misma categoría pero falsos (ej: 3 prendas de ropa, 3 días de la semana).
    - EJEMPLO GENÉRICO: "¿Qué compramos en la tienda?" → options: ["Vaqueros", "Camisetas", "Zapatos"].

    ########################################
    # SI TU DIFICULTAD ES "difícil":
    ########################################
    - PREGUNTA: Sobre el "POR QUÉ" o el "CÓMO" de algo, o sobre un detalle secundario muy preciso que requiera haber entendido la relación entre dos hechos de la historia (ej: "¿Por qué cambiamos de tienda?", "¿Qué pasó justo después de...?").
    - DISTRACTORES: Que TAMBIÉN podrían ser verdad si no se recuerda bien. Todos deben sonar plausibles.
    - EJEMPLO GENÉRICO: "¿Por qué tuvimos que ir a otra tienda?" → options: ["No tenían la talla", "Estaba cerrada", "Era muy cara"].

    {feedback_ia}

    {content_to_avoid}

    INFORMACION:
    - {informacion}

    REGLAS QUE APLICAN A TODOS LOS NIVELES:
    - Escribe en PRIMERA o SEGUNDA persona. NUNCA "el narrador" o "el protagonista".
    - "options" = array de 3 strings del mismo tipo.
    - "correct_answer" = ÍNDICE (0, 1 o 2) de la opción correcta.
    - La pregunta debe ser concisa y directa.

    JSON REQUERIDO (sin nada más):
    {
      "type": "multiple_choice",
      "question": string,
      "options": array de 3 strings,
      "correct_answer": integer (0, 1 o 2),
      "hint": string,
      "difficulty": "{dificultad}"
    }
  expected_output: >
    Un único objeto JSON válido con las claves exactas:
    type, question, options, correct_answer, hint, difficulty.
  agent: "multiple_choice_agent"

ordering_task:
  description: >
    Genera UN ejercicio de ordenación basado en una secuencia de EVENTOS.

    ╔══════════════════════════════════════════════════════════════╗
    ║  TU NIVEL DE DIFICULTAD ES: >>> {dificultad} <<<            ║
    ║  SIGUE SOLO Y EXCLUSIVAMENTE LAS REGLAS DE ESE NIVEL        ║
    ╚══════════════════════════════════════════════════════════════╝

    ########################################
    # SI TU DIFICULTAD ES "fácil":
    ########################################
    - NÚMERO DE OPCIONES en "options": Exactamente 3.
    - TIPO DE OPCIONES: Muy separadas entre sí (principio, medio, final de la historia).
    - EJEMPLO GENÉRICO: ["Llegué a casa", "Comimos juntos", "Se fue por la tarde"].

    ########################################
    # SI TU DIFICULTAD ES "media":
    ########################################
    - NÚMERO DE OPCIONES en "options": Exactamente 4.
    - TIPO DE OPCIONES: Pasos intermedios de una misma actividad. Requiere recordar los detalles de la secuencia.
    - EJEMPLO GENÉRICO: ["Llegué a la tienda", "Elegimos la ropa", "Pagamos en caja", "Tomamos un helado"].

    ########################################
    # SI TU DIFICULTAD ES "difícil":
    ########################################
    - NÚMERO DE OPCIONES en "options": Entre 5 y 6.
    - TIPO DE OPCIONES: Micro-acciones o matices dentro de una misma escena. El orden solo es deducible si se recuerda la secuencia exacta de la historia.
    - EJEMPLO GENÉRICO: ["Entramos en la tienda", "Pregunté por la talla", "No la tenían", "Fuimos a otra tienda", "Encontramos la correcta", "Pagamos"].


    {feedback_ia}

    {content_to_avoid}

    INFORMACION:
    - {informacion}

    REGLAS QUE APLICAN A TODOS LOS NIVELES:
    - Escribe en PRIMERA o SEGUNDA persona (mi, mis, yo, fui, llegué...). NUNCA "el narrador", "el protagonista".
    - Las frases deben representar acciones o hechos concretos, NO descripciones de ambiente.
    - "options" = los eventos DESORDENADOS.
    - "correct_answer" = los MISMOS eventos en orden cronológico correcto.
    - VALIDACIÓN CRUZADA: Cada elemento de "correct_answer" DEBE ser idéntico (carácter por carácter) a un elemento de "options".
    - PROHIBIDO: Frases sin relación de orden, "Evento 1/2/3", etiquetas técnicas.

    JSON REQUERIDO (sin nada más):
    {
      "type": "ordering",
      "question": string,
      "options": array de strings (desordenados),
      "correct_answer": array de strings (orden correcto),
      "hint": string,
      "difficulty": "{dificultad}"
    }
  expected_output: >
    Un único objeto JSON válido con las claves exactas:
    type, question, options, correct_answer, hint, difficulty.
  agent: "ordering_agent"

validate_fill_in_the_blank_task:
  description: >
    Valida un ejercicio de "Rellenar Huecos". 
    
    EJERCICIO: {ejercicio}
    INFORMACIÓN ORIGINAL: {informacion_original}
    
    TU MISIÓN:
    Actúa como un revisor técnico literal. No juzgues si la frase es extraña o poco común, solo comprueba si los datos existen en la fuente.

    REGLAS DE VALIDACIÓN:
    1. LITERALIDAD: ¿La frase de la pregunta (ignorando el hueco) existe en la INFORMACIÓN ORIGINAL?
    2. EXISTENCIA: ¿La "correct_answer" aparece literalmente en el texto original?
    3. RELEVANCIA COGNITIVA: ¿La palabra ocultada es un HECHO, NOMBRE o LUGAR? Si es un adjetivo decorativo (ej: "bueno", "caluroso"), un conector o un verbo genérico -> status: "error".
    4. PESO DE MEMORIA: Si la palabra puede adivinarse por gramática o contexto trivial (ej: "Me puse el _______ azul") sin conocer la historia -> status: "error".
    5. COHERENCIA: Si se rellena el hueco con la respuesta, ¿la frase resultante es verdadera según el texto?
    
    IMPORTANTE: Rechaza ejercicios que no requieran memoria real del contenido.

    RESULTADO (JSON):
    {
      "Analysis": "Explicación muy breve del fallo o 'Ejercicio correcto'",
      "status": "ok" o "error"
    }
  expected_output: >
    Un objeto JSON con Analysis y status.
  agent: "validator_agent"

validate_ordering_task:
  description: >
    Valida un ejercicio de "Ordenación".
    
    EJERCICIO: {ejercicio}
    INFORMACIÓN ORIGINAL: {informacion_original}
    
    REGLAS DE ORO:
    1. CRONOLOGÍA: Comprueba que el orden de las frases en "correct_answer" sea el mismo orden cronológico en el que aparecen en la INFORMACIÓN ORIGINAL. Si el orden es incorrecto o ilógico -> status: "error".
    2. COMPARACIÓN: Comprueba que "correct_answer" y "options" contengan las mismas frases exactas (carácter por carácter).
    3. CANTIDAD: Debe haber el mismo número de elementos en ambos listados (3 para fácil, 4 para media, 5-6 para difícil).
    4. RELEVANCIA: Cada frase debe representar un evento con peso en la historia, no detalles triviales de decoración.
    
    RESULTADO (JSON):
    {
      "Analysis": "Respuesta breve con el error o 'Ejercicio correcto'.",
      "status": "ok" o "error"
    }
    
  expected_output: >
    Un objeto JSON con Analysis y status.
  agent: "validator_agent"

validate_multiple_choice_task:
  description: >
    Valida un ejercicio de "Opción Múltiple" (multiple_choice).
    
    EJERCICIO: {ejercicio}
    INFORMACIÓN ORIGINAL: {informacion_original}
    
    REGLA CRÍTICA DE INDEXACIÓN (0-INDEXED):
    El campo "correct_answer" SIEMPRE es el índice del array "options", empezando desde 0.
    Ejemplo de mapeo mental que DEBES seguir:
    - Si correct_answer es 0 -> La opción es options[0] (la primera).
    - Si correct_answer es 1 -> La opción es options[1] (la segunda).
    - Si correct_answer es 2 -> La opción es options[2] (la tercera).

    PASOS DE VALIDACIÓN:
    1. Identifica qué opción ha marcado el ejercicio como correcta usando el mapeo anterior: options[correct_answer].
    2. Comprueba si ESE VALOR es verdadero según la INFORMACIÓN ORIGINAL.
    3. Comprueba que los otros valores en "options" (los distractores) sean falsos o no mencionados.
    4. Si options[correct_answer] COINCIDE con la verdad del texto -> status: "ok".
    5. Si options[correct_answer] es FALSO según el texto -> status: "error".

    IMPORTANTE: No te confundas. Si correct_answer es 1, la opción validada es la SEGUNDA de la lista. Si esa segunda opción es la verdad, el ejercicio es correcto.

    RESULTADO (JSON):
    {
      "Analysis": "explicación breve y técnica del porqué del status",
      "status": "ok" o "error"
    }

  expected_output: >
    Un objeto JSON con Analysis y status.
  agent: "validator_agent"

corrector_task:
  description: >
    Evalúa la respuesta de un usuario en un ejercicio de "Rellenar el hueco" (fill_in_the_blank).
    
    PALABRA CORRECTA ORIGINAL: {correct_answer}
    RESPUESTA DEL USUARIO: {user_answer}
    
    REGLAS DE CORRECCIÓN:
    1. Si coinciden exactamente o ignorando mayúsculas/minúsculas y tildes -> status: "ok"
    2. Si son sinónimos o palabras semánticamente muy cercanas dadas en el contexto -> status: "ok"
    3. Si el usuario ha cometido un ligero error tipográfico (typo, falta de ortografía menor) pero la intención y el concepto son claramente los mismos -> status: "ok"
    4. Si la palabra del usuario no tiene nada que ver, cambia radicalmente el significado o es un concepto distinto -> status: "error"
    
    RESULTADO ESPERADO (JSON valid code):
    {
      "analysis": "Breve explicación de la evaluación (ej. 'Respuesta correcta', 'Tiene un ligero typo pero es válida', o 'La palabra es incorrecta porque...').",
      "status": "ok" o "error"
    }

  expected_output: >
    Un objeto JSON con las claves 'analysis' y 'status'.
  agent: "corrector_agent"
