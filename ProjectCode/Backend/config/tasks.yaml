select_task:
  description: >
    Analiza la memoria proporcionada y extrae ÚNICAMENTE los datos y fragmentos de texto relevantes que servirán como "materia prima" para preparar futuros ejercicios cognitivos. 
    ¡ATENCIÓN! BAJO NINGÚN CONCEPTO DEBES GENERAR PREGUNTAS NI RESPUESTAS. TU ÚNICO TRABAJO ES EXTRAER INFORMACIÓN, DATOS Y TEXTO LITERAL DE LA MEMORIA ORIGINAL.
    
    INFORMACIÓN DE LA MEMORIA:
    - Título: {title}
    - Descripción: {description}
    {analysis}

    EJERCICIOS SOLICITADOS:
    - Tipos de ejercicios que alguien más generará posteriormente: {exercise_types}

    INSTRUCCIONES DE EXTRACCIÓN (NO HACER PREGUNTAS):
    Genera un JSON estructurado donde cada clave sea exactamente el nombre del tipo de ejercicio, y el valor sea un listado de HECHOS, DATOS o FRAGMENTOS DE TEXTO Puros extraídos del original.
    
    Reglas estrictas de extracción según el tipo de ejercicio futuro:
    - Para 'multiple_choice': Extrae una lista de afirmaciones cortas basadas en hechos concretos, nombres propios o fechas clave (Ej: "Leo tenía ocho años y la escena ocurrió en invierno", "Leo arrastraba los cordones de su zapatilla"). ¡NO ESCRIBAS PREGUNTAS O CUESTIONARIOS! Solo saca el 'dato'.
    - Para 'fill_in_the_blank': Extrae literalmente 2 o 3 frases o párrafos completos textualmente de la historia original. (Ej: "Su madre —mi hija— puso los ojos en blanco y me entregó una lista."). NO PONGAS HUECOS NI GUIONES, NO ESCRIBAS PREGUNTAS. Solo devuelve el texto original literal seleccionado.
    - Para 'ordering': Extrae del texto original de 4 a 6 eventos clave y preséntalos como una lista de oraciones literales en estricto orden cronológico. (Ej: ["Leo llegó justo después del desayuno.", "La madre me entregó una lista.", "Leo soltó un suspiro dramático."]). NO MANDES ORDENAR NADA.

    IMPORTANTE: Tu respuesta debe ser ÚNICA Y EXCLUSIVAMENTE un bloque JSON válido. No te inventes historias, cíñete a extraer datos.
  expected_output: >
    Un objeto JSON válido cuyas claves sean los tipos de ejercicio: {exercise_types}, y cuyos valores sean exclusivamente los datos, fragmentos literales o listados de hechos concretos en bruto. ¡ESTÁ TERMINANTEMENTE PROHIBIDO CONTENER PREGUNTAS!
  agent: "selector_agent"



fill_in_the_blank_task:
  description: >
    Genera un ejercicio tipo fill_in_the_blank de alta calidad.

    INFORMACION:
    - {informacion}

    PROCEDIMIENTO:
    1. Extrae una frase COMPLETA y LITERAL del texto.
    2. Identifica una palabra CLAVE (sustantivo o nombre propio).
    3. Crea la pregunta sustituyendo esa palabra por "_______".

    REGLAS DE ORO:
    - PROHIBIDO incluir texto como "Análisis previo de IA" o "Información:" dentro de la pregunta.
    - La pregunta debe ser SOLO la frase del relato.
    - La respuesta debe ser una única palabra.
    - Asegúrate de cerrar todas las comillas y llaves del JSON.

    EJEMPLO DE PREGUNTA CORRECTA: "Leo soltó un _______ dramático."
    EJEMPLO DE PREGUNTA INCORRECTA: "Información: Leo soltó un _______."

    FORMATO EXACTO:
    {
      "type": "fill_in_the_blank",
      "question": "Frase con _______ obligatoriamente",
      "correct_answer": "La palabra exacta que sustituiste",
      "hint": "Pista semántica",
      "difficulty": "fácil"
    }

    REGLA CRÍTICA DE VERIFICACIÓN:
    Antes de responder, comprueba:
    1. ¿Está el hueco "_______" en la pregunta? (DEBE ESTAR).
    2. ¿Está la palabra de "correct_answer" dentro de la pregunta? (NO DEBE ESTAR).

    PROHIBIDO:
    - Añadir texto antes o después del JSON.
    - Usar markdown.
    - Añadir comentarios.
    - Generar múltiples objetos.
    - Cambiar las claves del JSON.
  expected_output: >
    Un único objeto JSON válido con las claves exactas:
    type, question, correct_answer, hint, difficulty.
  agent: "fill_in_the_blank_agent"


multiple_choice_task:
  description: >
    Genera un ejercicio de opción múltiple.

    INFORMACION:
    - {informacion}

    REGLAS:
    - PROHIBIDO incluir metadatos técnicos o el texto de la instrucción en la pregunta.
    - La pregunta debe ser directa sobre el relato.
    - "options" debe ser una lista de 3 textos.
    - "correct_answer" debe ser el ÍNDICE (0, 1 o 2).

    FORMATO:
    {
      "type": "multiple_choice",
      "question": "¿Qué le entregó la madre?",
      "options": ["Una lista", "Una pelota", "Un libro"],
      "correct_answer": 0,
      "hint": "Estaba escrito en un papel",
      "difficulty": "fácil"
    }
    No incluyas nada más que el JSON.

    PROHIBIDO:
    - Añadir texto antes o después del JSON.
    - Usar markdown.
    - Añadir explicaciones.
    - Cambiar las claves del JSON.
    - Generar múltiples objetos.
  expected_output: >
    Un único objeto JSON válido con las claves exactas:
    type, question, options, correct_answer, hint, difficulty.
  agent: "multiple_choice_agent"


ordering_task:
  description: >
    Genera un ejercicio de ordenación.

    INFORMACION:
    - {informacion}

    INSTRUCCIONES CRÍTICAS (FALLO ZERO TOLERANCE):
    1. Selecciona 3 frases muy cortas (máximo 10 palabras cada una).
    2. Ponlas en "options" mezcladas.
    3. Ponlas en "correct_answer" ordenadas.
    4. VALIDACIÓN CRUZADA: Cada elemento de "correct_answer" DEBE ser idéntico (carácter por carácter) a un elemento de "options".

    PROHIBIDO:
    - Que "correct_answer" tenga frases que no están en "options".
    - Que las frases en "correct_answer" sean más largas o detalladas que las de "options".
    - Usar "Evento 1", "Evento 2", etc.

    REGLA DE ORO: No incluyas "Análisis de IA" ni etiquetas técnicas dentro de las frases.

    FORMATO:
    {
      "type": "ordering",
      "question": "Ordena estos momentos de la mañana:",
      "options": ["Me reí", "Leo llegó", "Me dio la lista"],
      "correct_answer": ["Leo llegó", "Me dio la lista", "Me reí"],
      "hint": "Primero entró en la casa",
      "difficulty": "media"
    }

    PROHIBIDO:
    - Añadir texto antes o después del JSON.
    - Usar markdown.
    - Añadir comentarios.
    - Generar múltiples objetos.
    - Cambiar las claves del JSON.
  expected_output: >
    Un único objeto JSON válido con las claves exactas:
    type, question, options, correct_answer, hint, difficulty.
  agent: "ordering_agent"

