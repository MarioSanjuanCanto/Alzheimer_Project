select_task:
  description: >
    Analiza la memoria proporcionada y extrae ÚNICAMENTE los datos y fragmentos de texto relevantes que servirán como "materia prima" para preparar futuros ejercicios cognitivos. 
    ¡ATENCIÓN! BAJO NINGÚN CONCEPTO DEBES GENERAR PREGUNTAS NI RESPUESTAS. TU ÚNICO TRABAJO ES EXTRAER INFORMACIÓN, DATOS Y TEXTO LITERAL DE LA MEMORIA ORIGINAL.
    
    INFORMACIÓN DE LA MEMORIA:
    - Título: {title}
    - Descripción: {description}
    {analysis}

    EJERCICIOS SOLICITADOS:
    - Tipos de ejercicios que alguien más generará posteriormente: {exercise_types}

    INSTRUCCIONES DE EXTRACCIÓN (NO HACER PREGUNTAS):
    Genera un JSON estructurado donde cada clave sea exactamente el nombre del tipo de ejercicio, y el valor sea un listado de HECHOS, DATOS o FRAGMENTOS DE TEXTO Puros extraídos del original.
    
        ESTRUCTURA JSON REQUERIDA:
    {
      "exercise_name1": "...",
      "exercise_name2": "...",
      "...": "...",

    }


    Reglas estrictas de extracción según el tipo de ejercicio futuro:
    - Para 'multiple_choice': Extrae una lista de afirmaciones cortas basadas en hechos concretos, nombres propios o fechas clave. ¡NO ESCRIBAS PREGUNTAS O CUESTIONARIOS! Solo saca el 'dato'.
    - Para 'fill_in_the_blank': Extrae literalmente 2 o 3 frases o párrafos completos textualmente de la historia original. NO PONGAS HUECOS NI GUIONES, NO ESCRIBAS PREGUNTAS. Solo devuelve el texto original literal seleccionado.
    - Para 'ordering': Extrae del texto original de 4 a 6 eventos clave y preséntalos como una lista de oraciones literales en estricto orden cronológico. NO MANDES ORDENAR NADA.

    IMPORTANTE: Tu respuesta debe ser ÚNICA Y EXCLUSIVAMENTE un bloque JSON válido. No te inventes historias, cíñete a extraer datos.
  expected_output: >
    Un objeto JSON válido cuyas claves sean los tipos de ejercicio: {exercise_types}, y cuyos valores sean exclusivamente los datos, fragmentos literales o listados de hechos concretos en bruto. ¡ESTÁ TERMINANTEMENTE PROHIBIDO CONTENER PREGUNTAS!
  agent: "selector_agent"

fill_in_the_blank_task:
  description: >
    Genera un ejercicio tipo fill_in_the_blank.
    
    INFORMACION (Puede ser un párrafo narrativo o una lista de hechos/frases independientes):
    -[ {informacion} ]

    NIVEL DE DIFICULTAD REQUERIDO: {dificultad}
    (Adaptación cognitiva: Si es 'fácil', usa vocabulario común y frases directas. Si es 'difícil', selecciona términos más técnicos o frases que requieran mayor memoria de trabajo).

    {feedback_ia}

    PROCEDIMIENTO:
    1. Identifica los elementos CRÍTICOS y MEMORABLES de la historia: nombres de personas, lugares concretos,
       objetos significativos, acciones centrales (ej: "parque", "nieto", "cumpleaños").
    2. Selecciona UNA frase BREVE (máximo 12-15 palabras) que contenga uno de esos elementos críticos.
    3. En "question", pon la frase sustituyendo ese elemento crítico por "_______".
    4. En "correct_answer", pon el elemento crítico que has ocultado.

    CRITERIO DE SELECCIÓN DE LA PALABRA CRÍTICA:
    - PRIORIZAR: Nombres de personas cercanas, lugares específicos, eventos clave y objetos que tengan una carga emocional o narrativa.
    - PROHIBIDO: Ocultar adjetivos decorativos (ej: "bonito", "cálido"), verbos genéricos (ej: "fue", "era"), conectores o cualquier palabra que pueda deducirse por gramática pura o contexto trivial.
    - El objetivo es evaluar la MEMORIA del contenido, no la capacidad lingüística. Si la respuesta puede adivinarse sin conocer la historia, el ejercicio es INVÁLIDO.

    REGLAS SEGÚN DIFICULTAD ({dificultad}):
    - Si es 'fácil': Oculta el protagonista o el lugar principal. La frase debe ser muy directa y la pista debe ser casi una definición (ej: "Mi nieto se llama _______" / Pista: "El nombre de tu nieto").
    - Si es 'media': Oculta un dato concreto que requiera recordar una acción o una relación (ej: "Fuimos a comer a la _______" / Pista: "Lugar donde ocurrió la comida familiar"). La palabra debe ser esencial para el sentido de la frase.
    - Si es 'difícil': Oculta un detalle específico, un objeto clave o un concepto que resuma un evento. La frase puede ser más larga o compleja, y la pista debe obligar a reflexionar sobre la historia (ej: "Lo que más me gustó del viaje fue ver el _______" / Pista: "El monumento principal que visitasteis"). PROHIBIDO ocultar adjetivos, colores o palabras genéricas.

    REGLAS GENERALES:
    - PERSPECTIVA: La historia la ha escrito la propia persona que juega. Las frases deben estar en
      PRIMERA o SEGUNDA PERSONA. Usa "mi", "mis", "yo", "me", "mí", "mi nieto", "mi casa", etc.
      NUNCA uses "el narrador", "el protagonista", "el abuelo", "la persona", "él/ella" para referirte
      al autor. Ej: MAL → "El narrador fue al parque". BIEN → "Fui al parque" / "Mi nieto fue al parque".
    - La frase elegida DEBE ser corta y de fácil lectura.
    - "question" DEBE contener el hueco "_______".
    - "correct_answer" debe ser UNA SOLA palabra que sea un elemento crítico de la historia.
    - PROHIBIDO incluir texto como "Análisis previo" o etiquetas dentro del JSON.

    ESTRUCTURA JSON REQUERIDA:
    {
      "type": "fill_in_the_blank",
      "question": string (la frase con el hueco "_______"),
      "correct_answer": string (la palabra que falta),
      "hint": string (pista semántica que ayude a recordar la palabra),
      "difficulty": string ("fácil", "media" o "difícil")
    }

    PROHIBIDO:
    - Hacer frases demasiado largas, tienen que ser breves y concisas.
    - Añadir texto antes o después del JSON.
    - Usar markdown.
    - Añadir comentarios.
    - Generar múltiples objetos.
    - Cambiar las claves del JSON.

    
  expected_output: >
    Un único objeto JSON válido con las claves exactas:
    type, question, correct_answer, hint, difficulty.
  agent: "fill_in_the_blank_agent"

multiple_choice_task:
  description: >
    Genera un ejercicio de opción múltiple.

    INFORMACION (Puede ser un párrafo narrativo o una lista de datos/frases sin correlación):
    - {informacion}

    NIVEL DE DIFICULTAD REQUERIDO: {dificultad}
    (Adaptación cognitiva: Si es 'fácil', haz que la respuesta sea evidente y los distractores muy distintos. Si es 'difícil', usa distractores sutiles o que requieran recordar detalles precisos).

    {feedback_ia}

    REGLAS SEGÚN DIFICULTAD ({dificultad}):
    - Si es 'fácil': Pregunta sobre el tema principal. Distractores muy diferentes (ej: si la respuesta es 'Perro', distractores: 'Avión', 'Manzana').
    - Si es 'media': Pregunta sobre un dato concreto. Distractores del mismo tipo pero incorrectos (ej: si la respuesta es 'Lunes', distractores: 'Jueves', 'Sábado').
    - Si es 'difícil': Pregunta sobre un detalle preciso o secundario. Distractores muy similares o que aparezcan en el texto en otro contexto para confundir si no se lee bien.

    REGLAS GENERALES:
    - PERSPECTIVA: La historia la ha escrito la propia persona que juega. Las preguntas y opciones deben
      estar en PRIMERA o SEGUNDA PERSONA. Usa "mi", "mis", "yo", "me", "mi nieto", "mi casa", etc.
      NUNCA uses "el narrador", "el protagonista", "el abuelo", "la persona", "él/ella" para referirte
      al autor. Ej: MAL → "¿Adónde fue el narrador?". BIEN → "¿Adónde fui?" / "¿Dónde estaba mi nieto?".
    - La pregunta debe ser concisa y directa.
    - "options" debe contener 3 opciones del mismo tipo (ej: 3 lugares, 3 fechas, 3 nombres).
    - Una opción es la correcta y las otras dos son "distractores" plausibles basados en la información.
    - "correct_answer" debe ser el ÍNDICE (0, 1 o 2) de la opción correcta.

    ESTRUCTURA JSON REQUERIDA:
    {
      "type": string (siempre "multiple_choice"),
      "question": string (pregunta directa sobre la información),
      "options": array de 3 strings (las tres opciones de respuesta),
      "correct_answer": integer (índice 0, 1 o 2 de la opción correcta),
      "hint": string (pista que ayude a recordar la respuesta),
      "difficulty": string ("fácil", "media" o "difícil")
    }
    No incluyas nada más que el JSON.

    PROHIBIDO:
    - Añadir texto antes o después del JSON.
    - Usar markdown.
    - Añadir explicaciones.
    - Cambiar las claves del JSON.
    - Generar múltiples objetos.

  expected_output: >
    Un único objeto JSON válido con las claves exactas:
    type, question, options, correct_answer, hint, difficulty.
  agent: "multiple_choice_agent"

ordering_task:
  description: >
    Genera un ejercicio de ordenación basado en una secuencia de EVENTOS.

    INFORMACION (Puede ser un párrafo o una lista de datos/frases):
    - {informacion}

    NIVEL DE DIFICULTAD REQUERIDO: {dificultad}
    (Adaptación cognitiva: Si es 'fácil', usa eventos con nexos temporales claros. Si es 'difícil', usa eventos más cercanos cronológicamente que requieran una lectura más minuciosa).

    {feedback_ia}

    REGLAS SEGÚN DIFICULTAD ({dificultad}):
    - Si es 'fácil': Usa 3 eventos muy separados y claros (ej: Llegada, Actividad principal, Salida).
    - Si es 'media': Usa 4 eventos que incluyan pasos intermedios de una misma actividad o conversación.
    - Si es 'difícil': Usa de 5 a 6 eventos muy detallados o matices de una secuencia compleja que requieran recordar exactamente el orden de los hechos (quién habló primero, qué se hizo después de un detalle específico).

    REGLAS GENERALES:
    - PERSPECTIVA: La historia la ha escrito la propia persona que juega. Las frases de los eventos deben
      estar en PRIMERA o SEGUNDA PERSONA. Usa "mi", "mis", "yo", "fui", "llegué", "mi nieto", etc.
      NUNCA uses "el narrador", "el protagonista", "el abuelo", "la persona", "él/ella" para referirte
      al autor. Ej: MAL → "El abuelo llegó al parque". BIEN → "Llegué al parque" / "Mi nieto llegó al parque".
    - Identifica una secuencia lógica de eventos (según la dificultad: 3 para fácil, 4 para media, 5-6 para difícil).
    - Las frases deben representar acciones o hechos con peso narrativo (quién lo hizo, a dónde se fue, qué ocurrió).
    - Evita usar frases abstractas, descripciones de ambiente o datos sin una relación secuencial lógica.
    - El objetivo es que el usuario deba reconstruir la HISTORIA en su mente para ordenar los elementos.
    - Ponlas en "options" mezcladas (desordenadas).
    - Ponlas en "correct_answer" en el orden cronológico o lógico exacto según la información.
    - VALIDACIÓN CRUZADA: Cada elemento de "correct_answer" DEBE ser idéntico (carácter por carácter) a un elemento de "options".

    PROHIBIDO:
    - Usar frases que no tengan una relación de orden clara (ej: "Me gusta el azul" y "Tengo 20 años").
    - Que "correct_answer" tenga frases que no están en "options".
    - Que las frases en "correct_answer" sean más largas o detalladas que las de "options".
    - Usar "Evento 1", "Evento 2", etc.

    REGLA DE ORO: No incluyas "Análisis de IA" ni etiquetas técnicas dentro de las frases. El orden debe ser evidente por el contenido.

    ESTRUCTURA JSON REQUERIDA:
    {
      "type": string (siempre "ordering"),
      "question": string (instrucción para ordenar los elementos),
      "options": array de strings (datos o frases cortas desordenadas),
      "correct_answer": array de strings (los mismos elementos en el orden lógico/secuencial correcto),
      "hint": string (pista sobre el orden),
      "difficulty": string ("fácil", "media" o "difícil")
    }

    PROHIBIDO:
    - Añadir texto antes o después del JSON.
    - Usar markdown.
    - Añadir comentarios.
    - Generar múltiples objetos.
    - Cambiar las claves del JSON.

  expected_output: >
    Un único objeto JSON válido con las claves exactas:
    type, question, options, correct_answer, hint, difficulty.
  agent: "ordering_agent"



validate_fill_in_the_blank_task:
  description: >
    Valida un ejercicio de "Rellenar Huecos". 
    
    EJERCICIO: {ejercicio}
    INFORMACIÓN ORIGINAL: {informacion_original}
    
    TU MISIÓN:
    Actúa como un revisor técnico literal. No juzgues si la frase es extraña o poco común, solo comprueba si los datos existen en la fuente.

    REGLAS DE VALIDACIÓN:
    1. LITERALIDAD: ¿La frase de la pregunta (ignorando el hueco) existe en la INFORMACIÓN ORIGINAL?
    2. EXISTENCIA: ¿La "correct_answer" aparece literalmente en el texto original?
    3. RELEVANCIA COGNITIVA: ¿La palabra ocultada es un HECHO, NOMBRE o LUGAR? Si es un adjetivo decorativo (ej: "bueno", "caluroso"), un conector o un verbo genérico -> status: "error".
    4. PESO DE MEMORIA: Si la palabra puede adivinarse por gramática o contexto trivial (ej: "Me puse el _______ azul") sin conocer la historia -> status: "error".
    5. COHERENCIA: Si se rellena el hueco con la respuesta, ¿la frase resultante es verdadera según el texto?
    
    IMPORTANTE: Rechaza ejercicios que no requieran memoria real del contenido.

    RESULTADO (JSON):
    {
      "Analysis": "Explicación muy breve del fallo o 'Ejercicio correcto'",
      "status": "ok" o "error"
    }
  expected_output: >
    Un objeto JSON con Analysis y status.
  agent: "validator_agent"

validate_ordering_task:
  description: >
    Valida un ejercicio de "Ordenación".
    
    EJERCICIO: {ejercicio}
    INFORMACIÓN ORIGINAL: {informacion_original}
    
    REGLAS DE ORO:
    1. CRONOLOGÍA: Comprueba que el orden de las frases en "correct_answer" sea el mismo orden cronológico en el que aparecen en la INFORMACIÓN ORIGINAL. Si el orden es incorrecto o ilógico -> status: "error".
    2. COMPARACIÓN: Comprueba que "correct_answer" y "options" contengan las mismas frases exactas (carácter por carácter).
    3. CANTIDAD: Debe haber el mismo número de elementos en ambos listados (3 para fácil, 4 para media, 5-6 para difícil).
    4. RELEVANCIA: Cada frase debe representar un evento con peso en la historia, no detalles triviales de decoración.
    
    RESULTADO (JSON):
    {
      "Analysis": "Respuesta breve con el error o 'Ejercicio correcto'.",
      "status": "ok" o "error"
    }
    
  expected_output: >
    Un objeto JSON con Analysis y status.
  agent: "validator_agent"

validate_multiple_choice_task:
  description: >
    Valida un ejercicio de "Opción Múltiple" (multiple_choice).
    
    EJERCICIO: {ejercicio}
    INFORMACIÓN ORIGINAL: {informacion_original}
    
    REGLA CRÍTICA DE INDEXACIÓN (0-INDEXED):
    El campo "correct_answer" SIEMPRE es el índice del array "options", empezando desde 0.
    Ejemplo de mapeo mental que DEBES seguir:
    - Si correct_answer es 0 -> La opción es options[0] (la primera).
    - Si correct_answer es 1 -> La opción es options[1] (la segunda).
    - Si correct_answer es 2 -> La opción es options[2] (la tercera).

    PASOS DE VALIDACIÓN:
    1. Identifica qué opción ha marcado el ejercicio como correcta usando el mapeo anterior: options[correct_answer].
    2. Comprueba si ESE VALOR es verdadero según la INFORMACIÓN ORIGINAL.
    3. Comprueba que los otros valores en "options" (los distractores) sean falsos o no mencionados.
    4. Si options[correct_answer] COINCIDE con la verdad del texto -> status: "ok".
    5. Si options[correct_answer] es FALSO según el texto -> status: "error".

    IMPORTANTE: No te confundas. Si correct_answer es 1, la opción validada es la SEGUNDA de la lista. Si esa segunda opción es la verdad, el ejercicio es correcto.

    RESULTADO (JSON):
    {
      "Analysis": "explicación breve y técnica del porqué del status",
      "status": "ok" o "error"
    }

  expected_output: >
    Un objeto JSON con Analysis y status.
  agent: "validator_agent"

corrector_task:
  description: >
    Evalúa la respuesta de un usuario en un ejercicio de "Rellenar el hueco" (fill_in_the_blank).
    
    PALABRA CORRECTA ORIGINAL: {correct_answer}
    RESPUESTA DEL USUARIO: {user_answer}
    
    REGLAS DE CORRECCIÓN:
    1. Si coinciden exactamente o ignorando mayúsculas/minúsculas y tildes -> status: "ok"
    2. Si son sinónimos o palabras semánticamente muy cercanas dadas en el contexto -> status: "ok"
    3. Si el usuario ha cometido un ligero error tipográfico (typo, falta de ortografía menor) pero la intención y el concepto son claramente los mismos -> status: "ok"
    4. Si la palabra del usuario no tiene nada que ver, cambia radicalmente el significado o es un concepto distinto -> status: "error"
    
    RESULTADO ESPERADO (JSON valid code):
    {
      "analysis": "Breve explicación de la evaluación (ej. 'Respuesta correcta', 'Tiene un ligero typo pero es válida', o 'La palabra es incorrecta porque...').",
      "status": "ok" o "error"
    }

  expected_output: >
    Un objeto JSON con las claves 'analysis' y 'status'.
  agent: "corrector_agent"
