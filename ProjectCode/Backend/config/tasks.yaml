select_task:
  description: >
    Analiza la memoria proporcionada y extrae ÚNICAMENTE los datos y fragmentos de texto relevantes que servirán como "materia prima" para preparar futuros ejercicios cognitivos. 
    ¡ATENCIÓN! BAJO NINGÚN CONCEPTO DEBES GENERAR PREGUNTAS NI RESPUESTAS. TU ÚNICO TRABAJO ES EXTRAER INFORMACIÓN, DATOS Y TEXTO LITERAL DE LA MEMORIA ORIGINAL.
    
    INFORMACIÓN DE LA MEMORIA:
    - Título: {title}
    - Descripción: {description}
    - Análisis previo de IA: {analysis}

    EJERCICIOS SOLICITADOS:
    - Tipos de ejercicios que alguien más generará posteriormente: {exercise_types}

    INSTRUCCIONES DE EXTRACCIÓN (NO HACER PREGUNTAS):
    Genera un JSON estructurado donde cada clave sea exactamente el nombre del tipo de ejercicio, y el valor sea un listado de HECHOS, DATOS o FRAGMENTOS DE TEXTO Puros extraídos del original.
    
    Reglas estrictas de extracción según el tipo de ejercicio futuro:
    - Para 'multiple_choice': Extrae una lista de afirmaciones cortas basadas en hechos concretos, nombres propios o fechas clave (Ej: "Leo tenía ocho años y la escena ocurrió en invierno", "Leo arrastraba los cordones de su zapatilla"). ¡NO ESCRIBAS PREGUNTAS O CUESTIONARIOS! Solo saca el 'dato'.
    - Para 'fill_in_the_blank': Extrae literalmente 2 o 3 frases o párrafos completos textualmente de la historia original. (Ej: "Su madre —mi hija— puso los ojos en blanco y me entregó una lista."). NO PONGAS HUECOS NI GUIONES, NO ESCRIBAS PREGUNTAS. Solo devuelve el texto original literal seleccionado.
    - Para 'ordering': Extrae del texto original de 4 a 6 eventos clave y preséntalos como una lista de oraciones literales en estricto orden cronológico. (Ej: ["Leo llegó justo después del desayuno.", "La madre me entregó una lista.", "Leo soltó un suspiro dramático."]). NO MANDES ORDENAR NADA.

    IMPORTANTE: Tu respuesta debe ser ÚNICA Y EXCLUSIVAMENTE un bloque JSON válido. No te inventes historias, cíñete a extraer datos.
  expected_output: >
    Un objeto JSON válido cuyas claves sean los tipos de ejercicio: {exercise_types}, y cuyos valores sean exclusivamente los datos, fragmentos literales o listados de hechos concretos en bruto. ¡ESTÁ TERMINANTEMENTE PROHIBIDO CONTENER PREGUNTAS!
  agent: "selector_agent"



fill_in_the_blank_task:
  description: >
    Genera un ejercicio tipo fill_in_the_blank basado exclusivamente en la informacion proporcionada.

    INFORMACION:
    - Información: {informacion}

    REGLAS OBLIGATORIAS:
    - Debes crear una única frase incompleta basada en el texto original.
    - Debes seleccionar UNA palabra o frase exacta del texto como respuesta correcta.
    - En el campo "question", debes reemplazar EXACTAMENTE esa palabra o frase seleccionada por: "_______"
    - El reemplazo debe mantener la puntuación original de la oración.
    - La pregunta debe tener un solo hueco claro.
    - La pregunta NO puede exceder los 150 caracteres.
    - La respuesta correcta debe ser una palabra o frase EXACTA extraída literalmente del texto original.
    - No inventes contenido.
    - No reformules la respuesta correcta.
    - No añadas explicaciones.

    FORMATO DE SALIDA OBLIGATORIO:
    Devuelve EXCLUSIVAMENTE un JSON válido con esta estructura exacta:

    {
      "type": "fill_in_the_blank",
      "question": "...",
      "correct_answer": "...",
      "hint": "...",
      "difficulty": "..."
    }

    PROHIBIDO:
    - Añadir texto antes o después del JSON.
    - Usar markdown.
    - Añadir comentarios.
    - Devolver múltiples objetos.
    - Cambiar las claves del JSON.
  expected_output: >
    Un único objeto JSON válido con las claves exactas:
    type, question, correct_answer, hint, difficulty.
  agent: "fill_in_the_blank_agent"
  

multiple_choice_task:
  description: >
    Genera un ejercicio tipo multiple_choice basado exclusivamente en la informacion proporcionada.

    INFORMACION:
    - Información: {informacion}

    REGLAS OBLIGATORIAS:
    - Debes generar UNA sola pregunta clara y directa.
    - La pregunta debe basarse únicamente en información real del texto.
    - Debe haber exactamente 3 o 4 opciones.
    - Todas las opciones deben ser plausibles.
    - Solo UNA opción puede ser correcta.
    - "correct_answer" debe ser el índice numérico (base 0).
    - No inventes hechos que no estén en la memoria.
    - No reformules el dato correcto de manera que cambie su significado.

    FORMATO DE SALIDA OBLIGATORIO:
    Devuelve EXCLUSIVAMENTE un JSON válido con esta estructura exacta:

    {
      "type": "multiple_choice",
      "question": "...",
      "options": ["...", "...", "..."],
      "correct_answer": 0,
      "hint": "...",
      "difficulty": "..."
    }

    PROHIBIDO:
    - Añadir texto antes o después del JSON.
    - Usar markdown.
    - Añadir explicaciones.
    - Cambiar las claves del JSON.
    - Generar múltiples objetos.
  expected_output: >
    Un único objeto JSON válido con las claves exactas:
    type, question, options, correct_answer, hint, difficulty.
  agent: "multiple_choice_agent"


ordering_task:
  description: >
    Genera un ejercicio tipo ordering basado exclusivamente en la informacion proporcionada.

    INFORMACION:
    - Información: {informacion}

    REGLAS OBLIGATORIAS:
    - Debes generar UN solo ejercicio.
    - Debes seleccionar entre 3 y 4 eventos reales del texto original.
    - Los eventos deben ser frases exactas o ligeramente ajustadas sin cambiar su significado.
    - El campo "options" debe contener los eventos en orden DESORDENADO.
    - El campo "correct_answer" debe contener EXACTAMENTE los mismos strings que aparecen en "options",
      pero en el orden cronológico correcto según la historia.
    - No inventes eventos.
    - No reformules el contenido de manera que cambie su significado.
    - No añadas explicaciones.
    - El campo "correct_answer" debe contener EXACTAMENTE los mismos strings que aparecen en "options".
    - No modifiques puntuación.
    - No añadas ni elimines caracteres.
    - No añadas comas.
    - No cambies espacios.
    - No incluyas recuerdos o reflexiones pasadas si no forman parte de la secuencia principal.
    
    FORMATO DE SALIDA OBLIGATORIO:
    Devuelve EXCLUSIVAMENTE un JSON válido con esta estructura exacta:

    {
      "type": "ordering",
      "question": "...",
      "options": ["...", "...", "..."],
      "correct_answer": ["...", "...", "..."],
      "hint": "...",
      "difficulty": "..."
    }

    PROHIBIDO:
    - Añadir texto antes o después del JSON.
    - Usar markdown.
    - Añadir comentarios.
    - Generar múltiples objetos.
    - Cambiar las claves del JSON.
  expected_output: >
    Un único objeto JSON válido con las claves exactas:
    type, question, options, correct_answer, hint, difficulty.
  agent: "ordering_agent"

